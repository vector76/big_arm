name: Deploy model to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: model
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: model/package-lock.json
      # OpenSCAD nightly renders the CAD twin's meshes (export:cad).
      # Pinned to the version the export pipeline was verified against;
      # bump deliberately. --appimage-extract avoids needing FUSE.
      - name: Install OpenSCAD nightly
        run: |
          # the AppImage expects the host's GL vendor libs (libglvnd);
          # the runner image doesn't ship them
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libopengl0 libglx0 libglu1-mesa
          curl -fsSLo /tmp/openscad.AppImage \
            https://files.openscad.org/snapshots/OpenSCAD-2026.06.21-x86_64.AppImage
          chmod +x /tmp/openscad.AppImage
          (cd /tmp && ./openscad.AppImage --appimage-extract > /dev/null)
          echo "OPENSCAD=/tmp/squashfs-root/AppRun" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run export:cad
        env:
          QT_QPA_PLATFORM: offscreen  # no display on the runner
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: model/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
